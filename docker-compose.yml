services:
  app01-php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: app01-php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    environment:
      PHP_IDE_CONFIG: "serverName=app01"
      XDEBUG_MODE: "${XDEBUG_MODE:-debug}"
      XDEBUG_CONFIG: "client_host=host.docker.internal client_port=9003"
    depends_on:
      app01-mysql:
        condition: service_healthy
      app01-redis:
        condition: service_healthy
      app01-rabbitmq:
        condition: service_healthy
    networks:
      - app01-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  app01-nginx:
    image: nginx:1.25-alpine
    container_name: app01-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app01-php
    networks:
      - app01-network

  app01-mysql:
    image: mysql:8.0
    container_name: app01-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootpassword}"
      MYSQL_DATABASE: "${DB_DATABASE:-notifications}"
      MYSQL_USER: "${DB_USERNAME:-notif_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-notif_pass}"
    volumes:
      - app01-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "33061:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app01-network

  app01-redis:
    image: redis:7.2-alpine
    container_name: app01-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-redis_pass}"
    volumes:
      - app01-redis-data:/data
    ports:
      - "63791:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app01-network

  app01-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: app01-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-rabbit_user}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-rabbit_pass}"
      RABBITMQ_DEFAULT_VHOST: "${RABBITMQ_VHOST:-notifications}"
    volumes:
      - app01-rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    ports:
      - "56721:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - app01-network

  app01-worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: app01-worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work rabbitmq --queue=notifications --tries=3 --timeout=90 --sleep=3 --max-jobs=1000
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      app01-mysql:
        condition: service_healthy
      app01-redis:
        condition: service_healthy
      app01-rabbitmq:
        condition: service_healthy
    networks:
      - app01-network

  app01-scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: app01-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - app01-php
    networks:
      - app01-network
      
  app01-mailpit:
    image: axllent/mailpit:latest
    container_name: app01-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app01-network

volumes:
  app01-mysql-data:
  app01-redis-data:
  app01-rabbitmq-data:

networks:
  app01-network:
    driver: bridge
    name: app01-network

